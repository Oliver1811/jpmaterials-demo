<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart — JP Materials</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =====================================================================
       NAVBAR
       ===================================================================== -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">JP<span>Materials</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="pricing.html">Pricing</a></li>
        <li><a href="about.html">About</a></li>
        <li>
          <a href="cart.html" class="nav-cart-link active">
            Cart
            <span class="cart-badge">0</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- =====================================================================
       CART PAGE
       ===================================================================== -->
  <main>
    <div class="container">

      <h1 style="margin-bottom: 1.5rem;">Your Cart</h1>

      <!-- Order placed confirmation banner (hidden until checkout) -->
      <div class="confirmation-banner" id="confirmation-banner">
        ✓ Thank you! Your order has been placed. We'll be in touch soon.
      </div>

      <!-- Main content: injected by renderCart() -->
      <div id="cart-content"></div>

    </div>
  </main>

  <!-- =====================================================================
       FOOTER
       ===================================================================== -->
  <footer>
    <p>&copy; 2026 JP Materials. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
  <script>
    // -------------------------------------------------------------------------
    // Bootstrap
    // -------------------------------------------------------------------------
    document.addEventListener("DOMContentLoaded", () => {
      renderCart();
    });

    // -------------------------------------------------------------------------
    // Cart rendering
    // -------------------------------------------------------------------------

    /**
     * Renders the full cart view, or an empty-state if the cart has no items.
     */
    function renderCart() {
      const cart = getCart();
      const container = document.getElementById("cart-content");

      if (cart.length === 0) {
        renderEmptyCart(container);
        return;
      }

      // Build the two-column layout: item list + order summary
      container.innerHTML = `
        <div class="cart-layout">

          <!-- Left: cart items -->
          <div class="cart-items" id="cart-items-list"></div>

          <!-- Right: order summary panel -->
          <aside class="order-summary">
            <h2>Order Summary</h2>

            <div class="summary-row">
              <span>Subtotal</span>
              <span id="summary-subtotal">£0.00</span>
            </div>
            <div class="summary-row">
              <span>Delivery</span>
              <span>Free</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span id="summary-total">£0.00</span>
            </div>

            <button class="btn btn-primary btn-full" onclick="handleCheckout()">
              Proceed to Checkout
            </button>
            <a href="products.html" class="btn btn-secondary btn-full" style="margin-top:0.6rem;">
              Continue Shopping
            </a>
          </aside>

        </div>
      `;

      renderCartItems();
      updateSummary();
    }

    /**
     * Renders the list of cart item rows into #cart-items-list.
     * Called on load and after any quantity/remove change.
     */
    function renderCartItems() {
      const list = document.getElementById("cart-items-list");
      if (!list) return;

      const cart = getCart();
      list.innerHTML = "";

      cart.forEach((item) => {
        const product = getProductById(item.productId);
        if (!product) return;

        const lineTotal = (product.price * item.quantity).toFixed(2);
        const row = document.createElement("div");
        row.className = "cart-item";
        row.dataset.id = product.id;

        row.innerHTML = `
          <img
            class="cart-item__image"
            src="${product.image}"
            alt="${product.name}"
          />
          <div class="cart-item__details">
            <p class="cart-item__name">
              <a href="product.html?id=${product.id}">${product.name}</a>
            </p>
            <p class="cart-item__unit-price">£${product.price.toFixed(2)} each</p>
          </div>
          <div class="cart-item__controls">
            <!-- Quantity selector -->
            <div class="quantity-selector">
              <button type="button" onclick="handleDecrement(${product.id}, ${item.quantity}, ${product.stock})">−</button>
              <input
                type="number"
                value="${item.quantity}"
                min="1"
                max="${product.stock}"
                onchange="handleQtyInput(${product.id}, this.value, ${product.stock})"
              />
              <button type="button" onclick="handleIncrement(${product.id}, ${item.quantity}, ${product.stock})">+</button>
            </div>
            <!-- Line total -->
            <span class="cart-item__line-total">£${lineTotal}</span>
            <!-- Remove button -->
            <button
              class="btn btn-danger btn-sm"
              onclick="handleRemove(${product.id})"
              title="Remove item"
            >
              Remove
            </button>
          </div>
        `;

        list.appendChild(row);
      });
    }

    /**
     * Shows a friendly empty state when the cart has no items.
     * @param {HTMLElement} container
     */
    function renderEmptyCart(container) {
      container.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">🛒</span>
          <h2>Your cart is empty</h2>
          <p>Looks like you haven't added anything yet.</p>
          <a href="products.html" class="btn btn-primary">Browse Products</a>
        </div>
      `;
    }

    // -------------------------------------------------------------------------
    // Summary totals
    // -------------------------------------------------------------------------

    /**
     * Recalculates and updates the subtotal/total figures in the summary panel.
     */
    function updateSummary() {
      const total = getCartTotal();
      const formatted = `£${total.toFixed(2)}`;
      const subtotalEl = document.getElementById("summary-subtotal");
      const totalEl    = document.getElementById("summary-total");
      if (subtotalEl) subtotalEl.textContent = formatted;
      if (totalEl)    totalEl.textContent    = formatted;
    }

    // -------------------------------------------------------------------------
    // Quantity & remove handlers
    // -------------------------------------------------------------------------

    /**
     * Decrements quantity by 1. Removes the item if quantity reaches 0.
     */
    function handleDecrement(productId, currentQty, maxStock) {
      const newQty = currentQty - 1;
      updateQuantity(productId, newQty); // removeFromCart called internally if <= 0
      refreshAfterChange();
    }

    /**
     * Increments quantity by 1, capped at stock.
     */
    function handleIncrement(productId, currentQty, maxStock) {
      const newQty = Math.min(currentQty + 1, maxStock);
      updateQuantity(productId, newQty);
      refreshAfterChange();
    }

    /**
     * Handles direct input into the quantity field.
     */
    function handleQtyInput(productId, value, maxStock) {
      const newQty = Math.max(1, Math.min(parseInt(value, 10) || 1, maxStock));
      updateQuantity(productId, newQty);
      refreshAfterChange();
    }

    /**
     * Removes an item from the cart and re-renders.
     */
    function handleRemove(productId) {
      removeFromCart(productId);
      refreshAfterChange();
    }

    /**
     * Re-renders cart items and summary after any change.
     * If the cart is now empty, replaces the whole layout with the empty state.
     */
    function refreshAfterChange() {
      const cart = getCart();
      if (cart.length === 0) {
        renderCart(); // will show empty state
      } else {
        renderCartItems();
        updateSummary();
      }
    }

    // -------------------------------------------------------------------------
    // Checkout
    // -------------------------------------------------------------------------

    /**
     * Simulates checkout:
     * 1. Shows a confirmation banner
     * 2. Clears the cart
     * 3. Removes the cart layout, leaving only the banner
     */
    function handleCheckout() {
      // Show confirmation banner
      const banner = document.getElementById("confirmation-banner");
      banner.classList.add("visible");

      // Clear cart data
      clearCart();

      // Remove cart layout so only the banner remains
      const content = document.getElementById("cart-content");
      content.innerHTML = "";

      // Scroll to top so the banner is visible
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  </script>

</body>
</html>
