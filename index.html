<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JP Materials — Rendering Products</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =====================================================================
       NAVBAR
       ===================================================================== -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">JP<span>Materials</span></a>
      <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li>
          <a href="cart.html" class="nav-cart-link">
            Cart
            <span class="cart-badge">0</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- =====================================================================
       HERO
       ===================================================================== -->
  <section class="hero">
    <h1>Professional Rendering Products</h1>
    <p>Premium base coats, finishing renders, and additives — delivered direct to you.</p>
  </section>

  <!-- =====================================================================
       PRODUCT LISTING
       ===================================================================== -->
  <main>
    <div class="container">
      <h2 class="section-title">All Products</h2>
      <!-- Product cards are injected here by renderProductGrid() -->
      <div class="product-grid" id="product-grid"></div>
    </div>
  </main>

  <!-- =====================================================================
       FOOTER
       ===================================================================== -->
  <footer>
    <p>&copy; 2026 JP Materials. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
  <script>
    // -------------------------------------------------------------------------
    // Render the product grid on page load
    // -------------------------------------------------------------------------
    document.addEventListener("DOMContentLoaded", () => {
      renderProductGrid();
    });

    /**
     * Builds and injects a product card for every product in the products array.
     */
    function renderProductGrid() {
      const grid = document.getElementById("product-grid");

      products.forEach((product) => {
        const card = createProductCard(product);
        grid.appendChild(card);
      });
    }

    /**
     * Creates a single product card DOM element.
     * @param {Object} product - A product object from the products array
     * @returns {HTMLElement}
     */
    function createProductCard(product) {
      const card = document.createElement("div");
      card.className = "product-card";

      card.innerHTML = `
        <img
          class="product-card__image"
          src="${product.image}"
          alt="${product.name}"
          loading="lazy"
        />
        <div class="product-card__body">
          <h3 class="product-card__name">${product.name}</h3>
          <p class="product-card__price">£${product.price.toFixed(2)}</p>
          <div class="product-card__actions">
            <a href="product.html?id=${product.id}" class="btn btn-secondary btn-sm">View</a>
            <button
              class="btn btn-primary btn-sm"
              data-id="${product.id}"
              onclick="handleAddToCart(this, ${product.id})"
            >
              Add to Cart
            </button>
          </div>
        </div>
      `;

      return card;
    }

    /**
     * Adds the product to the cart and briefly shows "Added!" feedback on the button.
     * @param {HTMLButtonElement} btn - The clicked button element
     * @param {number} productId - The ID of the product to add
     */
    function handleAddToCart(btn, productId) {
      addToCart(productId, 1);

      // Visual feedback — revert after 1.5s
      btn.textContent = "Added!";
      btn.classList.add("btn-added");
      btn.disabled = true;

      setTimeout(() => {
        btn.textContent = "Add to Cart";
        btn.classList.remove("btn-added");
        btn.disabled = false;
      }, 1500);
    }
  </script>

</body>
</html>
